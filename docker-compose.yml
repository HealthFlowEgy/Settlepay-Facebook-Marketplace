version: '3.9'
services:
  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: settepay-api
    restart: unless-stopped
    ports: ["3001:3001"]
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file: ./backend/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [settepay_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: { VITE_API_URL: /api/v1 }
    container_name: settepay-frontend
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on: [api]
    networks: [settepay_net]

  postgres:
    image: postgres:15-alpine
    container_name: settepay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: settepay_marketplace
      POSTGRES_USER: settepay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # from .env / Secrets Manager
    volumes: [postgres_data:/var/lib/postgresql/data]
    # ports: ["5432:5432"]  # REMOVED — DB must not be publicly accessible (GAP-04)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U settepay -d settepay_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [settepay_net]

  redis:
    image: redis:7-alpine
    container_name: settepay-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes: [redis_data:/data]
    # ports: ["6379:6379"]  # REMOVED — Redis must not be publicly accessible (GAP-04)
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [settepay_net]

volumes:
  postgres_data:
  redis_data:

networks:
  settepay_net:
    driver: bridge
