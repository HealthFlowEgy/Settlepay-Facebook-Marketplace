name: SettePay Marketplace CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       settepay_test
          POSTGRES_USER:     settepay
          POSTGRES_PASSWORD: settepay_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://settepay:settepay_test@localhost:5432/settepay_test
        run: npx prisma migrate deploy

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          DATABASE_URL:            postgresql://settepay:settepay_test@localhost:5432/settepay_test
          JWT_SECRET:              test-jwt-secret-minimum-32-characters-long
          HP_TOKEN_ENCRYPTION_KEY: ${{ 'a' * 64 }}
          NODE_ENV:                test
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: /api/v1
        run: npm run build

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend npm audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Build & Push Docker Images ────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          push:      true
          tags:      ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/settepay-marketplace
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose exec -T api npx prisma migrate deploy
            echo "✅ Staging deployment complete"
